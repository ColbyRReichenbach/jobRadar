services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apptrail
      POSTGRES_USER: apptrail
      POSTGRES_PASSWORD: apptrail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apptrail -d apptrail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://apptrail:apptrail@postgres:5432/apptrail
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_URL: http://localhost:3000
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://apptrail:apptrail@postgres:5432/apptrail
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_URL: http://localhost:3000
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://apptrail:apptrail@postgres:5432/apptrail
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_URL: http://localhost:3000
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["celery", "-A", "backend.celery_app:celery_app", "worker", "--loglevel=info"]

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://apptrail:apptrail@postgres:5432/apptrail
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_URL: http://localhost:3000
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["celery", "-A", "backend.celery_app:celery_app", "beat", "--loglevel=info"]

  dashboard:
    build:
      context: .
      dockerfile: dashboardv2/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_LOCAL_DEV_AUTH: "true"
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
