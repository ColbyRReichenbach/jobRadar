<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="640" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">Automatic Job Detection</text>
  <text x="640" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8">Recognizes job listings across 15+ ATS platforms instantly</text>

  <!-- Browser mockup -->
  <g transform="translate(140, 120)">
    <!-- Browser chrome -->
    <rect width="1000" height="600" rx="12" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="1000" height="40" rx="12 12 0 0" fill="#0f172a"/>
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="20" r="6" fill="#22c55e"/>
    <!-- URL bar -->
    <rect x="120" y="8" width="760" height="24" rx="6" fill="rgba(255,255,255,0.06)"/>
    <text x="136" y="25" font-family="Inter, sans-serif" font-size="12" fill="#64748b">jobs.lever.co/acme-corp/senior-engineer</text>

    <!-- Page content (job listing mock) -->
    <rect x="0" y="40" width="1000" height="560" fill="white"/>

    <!-- Job listing header -->
    <rect x="80" y="80" width="520" height="24" rx="4" fill="#1e293b"/>
    <text x="90" y="97" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">Senior Software Engineer</text>
    <text x="80" y="130" font-family="Inter, sans-serif" font-size="14" fill="#64748b">Acme Corp - San Francisco, CA - $150k - $200k</text>

    <!-- Content lines -->
    <rect x="80" y="170" width="520" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="80" y="190" width="480" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="80" y="210" width="440" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="80" y="230" width="500" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="80" y="260" width="520" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="80" y="280" width="380" height="10" rx="3" fill="#e2e8f0"/>

    <!-- Toast notification (the star of this screenshot) -->
    <g transform="translate(600, 480)">
      <rect width="340" height="60" rx="14" fill="white" stroke="rgba(226,232,240,0.8)" stroke-width="1">
        <animate attributeName="y" from="10" to="0" dur="0.4s" fill="freeze"/>
      </rect>
      <!-- Drop shadow -->
      <rect x="4" y="4" width="340" height="60" rx="14" fill="rgba(0,0,0,0.04)"/>
      <rect width="340" height="60" rx="14" fill="white" stroke="rgba(226,232,240,0.8)" stroke-width="1"/>

      <!-- Logo -->
      <rect x="12" y="14" width="32" height="32" rx="9" fill="#0f172a"/>
      <path d="M28 38L28 22L28 38" fill="none" stroke="white" stroke-width="0"/>
      <text x="28" y="35" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="white">A</text>

      <!-- Text -->
      <text x="54" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0f172a">Job posting detected</text>
      <text x="54" y="44" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Open AppTrail to track this listing</text>

      <!-- Open button -->
      <rect x="230" y="14" width="56" height="32" rx="9" fill="#0f172a"/>
      <text x="258" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="white">Open</text>

      <!-- Not a job -->
      <text x="300" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Not a job</text>
    </g>
  </g>

  <!-- Annotation arrow -->
  <text x="640" y="770" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">AppTrail detects the job posting and shows a notification to save it</text>
</svg>
