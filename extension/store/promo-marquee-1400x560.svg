<svg width="1400" height="560" viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.4" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="280" r="250" fill="rgba(99,102,241,0.04)"/>
  <circle cx="1200" cy="280" r="200" fill="rgba(59,130,246,0.03)"/>

  <!-- Left side: Logo + Text -->
  <g transform="translate(120, 140)">
    <!-- Logo -->
    <rect width="72" height="72" rx="18" fill="rgba(255,255,255,0.08)"/>
    <g transform="translate(36, 36)">
      <path d="M-16 18L0 -18L16 18" fill="none" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-8 4H8" fill="none" stroke="#93c5fd" stroke-dasharray="5 5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-16" cy="18" r="5" fill="#f8fafc"/>
      <circle cx="0" cy="-18" r="5" fill="#f8fafc"/>
      <circle cx="16" cy="18" r="5" fill="#f8fafc"/>
    </g>

    <!-- Title -->
    <text x="90" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#f8fafc" letter-spacing="-1.5">AppTrail</text>
    <text x="90" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="3">JOB APPLICATION INTELLIGENCE</text>

    <!-- Tagline -->
    <text x="0" y="130" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#cbd5e1" letter-spacing="-0.3">Track every application from any career page.</text>
    <text x="0" y="160" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#64748b">Detects 15+ ATS platforms. Saves with one click. Powered by AI.</text>

    <!-- Feature pills row -->
    <g transform="translate(0, 195)">
      <rect width="135" height="34" rx="8" fill="rgba(99,102,241,0.15)"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc">15+ ATS Platforms</text>

      <rect x="145" y="0" width="110" height="34" rx="8" fill="rgba(34,197,94,0.12)"/>
      <text x="159" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#86efac">One-Click Save</text>

      <rect x="265" y="0" width="130" height="34" rx="8" fill="rgba(251,191,36,0.12)"/>
      <text x="279" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Gmail AI Classify</text>

      <rect x="405" y="0" width="125" height="34" rx="8" fill="rgba(244,114,182,0.12)"/>
      <text x="419" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f9a8d4">Resume Tailor</text>
    </g>
  </g>

  <!-- Right side: Mock side panel -->
  <g transform="translate(850, 60)">
    <!-- Browser-like chrome -->
    <rect width="430" height="440" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Side panel mock -->
    <rect x="200" y="0" width="230" height="440" rx="0 16 16 0" fill="#F5F5F0"/>
    <rect x="200" y="0" width="230" height="440" rx="0" fill="rgba(245,245,240,0.97)"/>

    <!-- Panel header -->
    <rect x="200" y="0" width="230" height="44" rx="0" fill="white"/>
    <rect x="212" y="10" width="24" height="24" rx="6" fill="#0f172a"/>
    <text x="212" y="26" font-size="8">
      <tspan fill="white" dx="5">A</tspan>
    </text>
    <text x="244" y="27" font-family="Georgia, serif" font-size="14" font-weight="600" fill="#0f172a">AppTrail</text>

    <!-- Job card mock -->
    <rect x="212" y="56" width="206" height="88" rx="8" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
    <rect x="222" y="66" width="56" height="16" rx="4" fill="rgba(99,102,241,0.1)"/>
    <text x="250" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#6366f1">LEVER</text>
    <text x="222" y="96" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0f172a">Senior Engineer</text>
    <text x="222" y="112" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Acme Corp</text>
    <text x="222" y="128" font-family="Inter, sans-serif" font-size="10" fill="#059669">$150k - $200k</text>

    <!-- Status badges mock -->
    <rect x="212" y="152" width="98" height="28" rx="7" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1"/>
    <text x="261" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#6366f1">Applied</text>
    <rect x="316" y="152" width="102" height="28" rx="7" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
    <text x="367" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#64748b">Interviewing</text>

    <!-- Save button mock -->
    <rect x="212" y="192" width="206" height="36" rx="10" fill="url(#btn-grad)"/>
    <defs>
      <linearGradient id="btn-grad" x1="0" y1="0" x2="1" y2="1">
        <stop stop-color="#0f172a"/>
        <stop offset="1" stop-color="#1d4ed8"/>
      </linearGradient>
    </defs>
    <text x="315" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="white">Track This Job</text>

    <!-- Contact card mock -->
    <text x="212" y="252" font-family="Georgia, serif" font-size="12" font-weight="600" fill="#0f172a">Contacts</text>
    <rect x="212" y="260" width="206" height="52" rx="8" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
    <circle cx="232" cy="286" r="12" fill="rgba(99,102,241,0.1)"/>
    <text x="232" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#6366f1">JD</text>
    <text x="252" y="282" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0f172a">Jane Doe</text>
    <text x="252" y="296" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Engineering Manager</text>

    <!-- Fake browser content on left side -->
    <rect x="12" y="52" width="176" height="12" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="12" y="72" width="140" height="10" rx="3" fill="rgba(255,255,255,0.04)"/>
    <rect x="12" y="90" width="160" height="10" rx="3" fill="rgba(255,255,255,0.04)"/>
    <rect x="12" y="108" width="120" height="10" rx="3" fill="rgba(255,255,255,0.04)"/>
    <rect x="12" y="140" width="176" height="80" rx="6" fill="rgba(255,255,255,0.03)"/>
    <rect x="12" y="232" width="176" height="10" rx="3" fill="rgba(255,255,255,0.04)"/>
    <rect x="12" y="250" width="150" height="10" rx="3" fill="rgba(255,255,255,0.04)"/>
    <rect x="12" y="268" width="165" height="10" rx="3" fill="rgba(255,255,255,0.04)"/>
  </g>
</svg>
