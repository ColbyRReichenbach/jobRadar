    <g transform="translate(0, 120)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#2164f3">&#9679;</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Indeed</text>
    </g>
    <g transform="translate(200, 120)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0caa41">G</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Glassdoor</text>
    </g>
    <g transform="translate(400, 120)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#23c1ab">Z</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">ZipRecruiter</text>
    </g>
    <g transform="translate(600, 120)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#f97316">W</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Wellfound</text>
    </g>
    <g transform="translate(800, 120)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#3b82f6">S</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">SmartRecruiters</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 240)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ef4444">i</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">iCIMS</text>
