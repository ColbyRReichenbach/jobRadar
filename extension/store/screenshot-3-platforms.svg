<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <text x="640" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#f8fafc">Works Everywhere You Apply</text>
  <text x="640" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8">Automatic detection across 15+ applicant tracking systems</text>

  <!-- Platform grid -->
  <g transform="translate(140, 140)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#0a66c2">in</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">LinkedIn</text>
    </g>
    <g transform="translate(200, 0)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#2ea44f">&#9670;</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Greenhouse</text>
    </g>
    <g transform="translate(400, 0)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#5b5fc7">&#9650;</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Lever</text>
    </g>
    <g transform="translate(600, 0)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ff6b00">W</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Workday</text>
    </g>
    <g transform="translate(800, 0)">
      <rect width="180" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#6366f1">A</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Ashby</text>
