  <!-- Bottom text -->
  <text x="640" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#cbd5e1">Plus any page with /careers, /jobs, or /openings in the URL</text>

  <!-- Feature callouts -->
  <g transform="translate(260, 600)">
    <rect width="200" height="60" rx="10" fill="rgba(99,102,241,0.1)"/>
    <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc">URL Pattern Matching</text>
    <text x="100" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Regex-based detection</text>
  </g>
  <g transform="translate(520, 600)">
    <rect width="200" height="60" rx="10" fill="rgba(34,197,94,0.1)"/>
    <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#86efac">SPA Navigation</text>
    <text x="100" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Handles client-side routing</text>
  </g>
  <g transform="translate(780, 600)">
    <rect width="200" height="60" rx="10" fill="rgba(251,191,36,0.1)"/>
    <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#fcd34d">Auto-Extract</text>
    <text x="100" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Title, company, salary, location</text>
  </g>

  <text x="640" y="720" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">New platforms added regularly based on user reports</text>
</svg>
