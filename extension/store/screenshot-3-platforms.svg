      <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#10b981">J</text>
      <text x="90" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Jobvite</text>
    </g>
    <g transform="translate(400, 240)">
