<svg width="920" height="680" viewBox="0 0 920 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="920" height="680" fill="url(#bg)"/>

  <!-- Subtle radial glow -->
  <circle cx="460" cy="280" r="300" fill="rgba(99,102,241,0.06)"/>

  <!-- Logo + Title -->
  <g transform="translate(460, 80)">
    <rect x="-32" y="-32" width="64" height="64" rx="16" fill="rgba(255,255,255,0.08)"/>
    <path d="M-14 16L0 -16L14 16" fill="none" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-7 3H7" fill="none" stroke="#93c5fd" stroke-dasharray="5 5" stroke-width="3" stroke-linecap="round"/>
    <circle cx="-14" cy="16" r="4" fill="#f8fafc"/>
    <circle cx="0" cy="-16" r="4" fill="#f8fafc"/>
    <circle cx="14" cy="16" r="4" fill="#f8fafc"/>
  </g>

  <text x="460" y="180" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="-1">AppTrail</text>
  <text x="460" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="2" text-transform="uppercase">JOB APPLICATION INTELLIGENCE</text>

  <!-- Three feature cards -->
  <!-- Card 1: Detect -->
  <g transform="translate(80, 270)">
    <rect width="230" height="260" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="20" y="24" width="44" height="44" rx="12" fill="rgba(99,102,241,0.15)"/>
    <text x="42" y="52" text-anchor="middle" font-size="20">&#128269;</text>
    <text x="20" y="96" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="600" fill="#f8fafc">Auto-Detect</text>
    <text x="20" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8" line-height="1.5">
      <tspan x="20" dy="0">Recognizes job listings on</tspan>
      <tspan x="20" dy="20">15+ ATS platforms including</tspan>
      <tspan x="20" dy="20">LinkedIn, Greenhouse, Lever,</tspan>
      <tspan x="20" dy="20">Workday, and more.</tspan>
    </text>
    <!-- Platform badges -->
    <rect x="20" y="210" width="70" height="24" rx="6" fill="rgba(59,130,246,0.15)"/>
    <text x="55" y="226" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#93c5fd">LinkedIn</text>
    <rect x="96" y="210" width="80" height="24" rx="6" fill="rgba(34,197,94,0.12)"/>
    <text x="136" y="226" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#86efac">Greenhouse</text>
  </g>

  <!-- Card 2: Track -->
  <g transform="translate(345, 270)">
    <rect width="230" height="260" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="20" y="24" width="44" height="44" rx="12" fill="rgba(34,197,94,0.12)"/>
    <text x="42" y="52" text-anchor="middle" font-size="20">&#128203;</text>
    <text x="20" y="96" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="600" fill="#f8fafc">One-Click Save</text>
    <text x="20" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Save jobs to your pipeline</tspan>
      <tspan x="20" dy="20">with a single click. Edit</tspan>
      <tspan x="20" dy="20">details, set status, and see</tspan>
      <tspan x="20" dy="20">contacts at the company.</tspan>
    </text>
    <!-- Mini status picker -->
    <rect x="20" y="210" width="80" height="24" rx="6" fill="rgba(99,102,241,0.15)"/>
    <text x="60" y="226" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#a5b4fc">Applied</text>
    <rect x="106" y="210" width="90" height="24" rx="6" fill="rgba(251,191,36,0.12)"/>
    <text x="151" y="226" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#fcd34d">Interviewing</text>
  </g>

  <!-- Card 3: Enrich -->
  <g transform="translate(610, 270)">
    <rect width="230" height="260" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="20" y="24" width="44" height="44" rx="12" fill="rgba(251,191,36,0.12)"/>
    <text x="42" y="52" text-anchor="middle" font-size="20">&#9889;</text>
    <text x="20" y="96" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="600" fill="#f8fafc">AI-Powered</text>
    <text x="20" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Email classification, contact</tspan>
      <tspan x="20" dy="20">enrichment, resume tailoring,</tspan>
      <tspan x="20" dy="20">and match scoring powered</tspan>
      <tspan x="20" dy="20">by OpenAI.</tspan>
    </text>
    <!-- AI badges -->
    <rect x="20" y="210" width="95" height="24" rx="6" fill="rgba(244,114,182,0.12)"/>
    <text x="67" y="226" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#f9a8d4">Email Classify</text>
    <rect x="121" y="210" width="85" height="24" rx="6" fill="rgba(167,139,250,0.12)"/>
    <text x="163" y="226" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#c4b5fd">Match Score</text>
  </g>

  <!-- Bottom tagline -->
  <text x="460" y="590" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#cbd5e1" letter-spacing="-0.3">Track every application from any career page.</text>
  <text x="460" y="618" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">No more spreadsheets. No more lost jobs.</text>

  <!-- CTA hint -->
  <rect x="370" y="638" width="180" height="32" rx="8" fill="rgba(99,102,241,0.2)"/>
  <text x="460" y="659" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc">Add to Chrome - Free</text>
</svg>
