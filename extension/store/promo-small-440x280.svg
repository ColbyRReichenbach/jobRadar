<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="440" y2="40"/>
    <line x1="0" y1="80" x2="440" y2="80"/>
    <line x1="0" y1="120" x2="440" y2="120"/>
    <line x1="0" y1="160" x2="440" y2="160"/>
    <line x1="0" y1="200" x2="440" y2="200"/>
    <line x1="0" y1="240" x2="440" y2="240"/>
    <line x1="40" y1="0" x2="40" y2="280"/>
    <line x1="80" y1="0" x2="80" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/>
    <line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/>
    <line x1="320" y1="0" x2="320" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(40, 70)">
    <rect width="56" height="56" rx="14" fill="rgba(255,255,255,0.1)"/>
    <g transform="translate(28, 28)">
      <path d="M-12 14L0 -14L12 14" fill="none" stroke="#f8fafc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-6 3H6" fill="none" stroke="#93c5fd" stroke-dasharray="4 4" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-12" cy="14" r="3.5" fill="#f8fafc"/>
      <circle cx="0" cy="-14" r="3.5" fill="#f8fafc"/>
      <circle cx="12" cy="14" r="3.5" fill="#f8fafc"/>
    </g>
  </g>

  <!-- Title -->
  <text x="112" y="94" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">AppTrail</text>

  <!-- Subtitle -->
  <text x="112" y="118" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="0.2">Job Application Intelligence</text>

  <!-- Feature pills -->
  <g transform="translate(40, 155)">
    <rect width="130" height="32" rx="8" fill="rgba(99,102,241,0.15)"/>
    <text x="12" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#a5b4fc">15+ ATS Platforms</text>
  </g>
  <g transform="translate(180, 155)">
    <rect width="120" height="32" rx="8" fill="rgba(34,197,94,0.12)"/>
    <text x="12" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#86efac">One-Click Save</text>
  </g>
  <g transform="translate(310, 155)">
    <rect width="95" height="32" rx="8" fill="rgba(251,191,36,0.12)"/>
    <text x="12" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#fcd34d">AI-Powered</text>
  </g>

  <!-- Tagline -->
  <text x="40" y="225" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#cbd5e1" letter-spacing="-0.2">Track every application from any career page.</text>
  <text x="40" y="248" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#64748b" letter-spacing="-0.2">No more spreadsheets. No more lost jobs.</text>
</svg>
