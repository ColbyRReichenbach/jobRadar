<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <text x="640" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#f8fafc">Side Panel — Edit and Save</text>
  <text x="640" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8">Review extracted data, edit fields, and save to your pipeline without leaving the page</text>

  <!-- Browser with side panel -->
  <g transform="translate(140, 120)">
    <rect width="1000" height="600" rx="12" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="1000" height="40" rx="12 12 0 0" fill="#0f172a"/>
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="20" r="6" fill="#22c55e"/>
    <rect x="120" y="8" width="760" height="24" rx="6" fill="rgba(255,255,255,0.06)"/>
    <text x="136" y="25" font-family="Inter, sans-serif" font-size="12" fill="#64748b">boards.greenhouse.io/stripe/jobs/5678901</text>

    <!-- Main content (dimmed) -->
    <rect x="0" y="40" width="650" height="560" fill="#f1f5f9"/>
    <rect x="40" y="80" width="400" height="20" rx="4" fill="#e2e8f0"/>
    <rect x="40" y="110" width="300" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="40" y="140" width="560" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="40" y="160" width="520" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="40" y="180" width="480" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="40" y="210" width="540" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="40" y="230" width="500" height="10" rx="3" fill="#e2e8f0"/>

    <!-- Side panel -->
    <rect x="650" y="40" width="350" height="560" fill="#F5F5F0"/>

    <!-- Panel header -->
    <rect x="650" y="40" width="350" height="44" fill="white"/>
    <rect x="666" y="50" width="26" height="26" rx="7" fill="#0f172a"/>
    <text x="679" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="white">A</text>
    <text x="700" y="68" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#0f172a">AppTrail</text>

    <!-- Platform badge -->
    <rect x="666" y="96" width="82" height="22" rx="6" fill="rgba(99,102,241,0.1)"/>
    <text x="707" y="111" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#6366f1">GREENHOUSE</text>

    <!-- Company card -->
    <rect x="666" y="128" width="318" height="64" rx="10" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
    <text x="678" y="146" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="0.5" text-transform="uppercase">COMPANY</text>
    <text x="678" y="170" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0f172a">Stripe</text>

    <!-- Role card -->
    <rect x="666" y="200" width="318" height="64" rx="10" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
    <text x="678" y="218" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="0.5">ROLE</text>
    <text x="678" y="242" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0f172a">Senior Backend Engineer</text>

    <!-- Location card -->
    <rect x="666" y="272" width="318" height="64" rx="10" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
    <text x="678" y="290" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="0.5">LOCATION</text>
    <text x="678" y="314" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#1e293b">San Francisco, CA (Hybrid)</text>

    <!-- Salary card -->
    <rect x="666" y="344" width="318" height="64" rx="10" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
    <text x="678" y="362" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="0.5">SALARY</text>
    <text x="678" y="386" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#059669">$180,000 - $240,000</text>

    <!-- Status picker -->
    <g transform="translate(666, 420)">
      <rect width="154" height="36" rx="9" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1.5"/>
      <text x="77" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#6366f1">Save for Later</text>
      <rect x="162" y="0" width="156" height="36" rx="9" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
      <text x="240" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#64748b">Already Applied</text>
    </g>

    <!-- Track button -->
    <rect x="666" y="470" width="318" height="42" rx="12" fill="url(#btn)"/>
    <text x="825" y="496" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="white">Track This Job</text>

    <!-- Contacts section -->
    <text x="666" y="540" font-family="Georgia, serif" font-size="14" font-weight="600" fill="#0f172a">Contacts</text>
    <rect x="666" y="550" width="318" height="40" rx="8" fill="white" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>
    <text x="690" y="576" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Sarah Chen</text>
    <text x="780" y="576" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Engineering Lead</text>
  </g>

  <text x="640" y="770" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">The side panel shows extracted job data alongside the career page</text>
</svg>
