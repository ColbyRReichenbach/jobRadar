<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppTrail Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #F5F5F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 440px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      border: 1px solid rgba(226,232,240,0.6);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .logo-row img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }

    h1 {
      font-family: 'Cormorant Garamond', ui-serif, Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
      margin: 8px 0 28px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: #334155;
      margin-bottom: 6px;
    }

    .hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 5px;
      line-height: 1.4;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #1e293b;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }
    input::placeholder { color: #94a3b8; }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: white; }

    button {
      width: 100%;
      padding: 11px 16px;
      margin-top: 4px;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(15,23,42,0.2);
      letter-spacing: -0.01em;
    }
    button:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.3); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .status {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.5;
      display: none;
    }
    .status.success { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-row">
      <img src="images/icon-48.png" alt="AppTrail">
      <h1>AppTrail</h1>
    </div>
    <p class="subtitle">Connect your extension to your AppTrail account. Generate a personal API key from the Settings page in your dashboard.</p>

    <div class="field">
      <label for="apiBase">Backend URL</label>
      <input type="url" id="apiBase" placeholder="https://api.apptrail.com">
      <p class="hint">Default is the production API. Use http://localhost:8000 for local development.</p>
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="aptk_..." autocomplete="off">
      <p class="hint">Stored in session storage only — clears when the browser closes.</p>
    </div>

    <button id="saveBtn">Save &amp; Validate</button>
    <div id="status" class="status"></div>
  </div>
  <script type="module" src="setup.js"></script>
</body>
</html>
