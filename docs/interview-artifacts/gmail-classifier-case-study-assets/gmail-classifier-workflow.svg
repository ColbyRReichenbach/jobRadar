<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="AppTrail Gmail classifier workflow">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="30" y="38" font-size="22" font-weight="700" fill="#102027">AppTrail Gmail classifier workflow</text>
  <text x="30" y="62" font-size="13" fill="#607d8b">Cheap deterministic routing handles clear cases; expensive semantic reasoning is reserved for ambiguous workflow-impacting cases.</text>
  <rect x="30" y="92" width="140" height="74" rx="8" fill="#e0f2f1" stroke="#b0bec5"/><text x="100.0" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#102027">Gmail sync</text><text x="100.0" y="145" text-anchor="middle" font-size="12" fill="#455a64">recent messages</text><rect x="205" y="92" width="150" height="74" rx="8" fill="#e0f2f1" stroke="#b0bec5"/><text x="280.0" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#102027">Preflight</text><text x="280.0" y="145" text-anchor="middle" font-size="12" fill="#455a64">redaction + safety</text><rect x="390" y="92" width="150" height="74" rx="8" fill="#e0f2f1" stroke="#b0bec5"/><text x="465.0" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#102027">Route-first</text><text x="465.0" y="145" text-anchor="middle" font-size="12" fill="#455a64">filter / convo / app</text><rect x="575" y="92" width="150" height="74" rx="8" fill="#e0f2f1" stroke="#b0bec5"/><text x="650.0" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#102027">Subtype policy</text><text x="650.0" y="145" text-anchor="middle" font-size="12" fill="#455a64">status gates</text><rect x="760" y="92" width="170" height="74" rx="8" fill="#e0f2f1" stroke="#b0bec5"/><text x="845.0" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#102027">Product surfaces</text><text x="845.0" y="145" text-anchor="middle" font-size="12" fill="#455a64">store, match, trace</text><rect x="390" y="230" width="150" height="70" rx="8" fill="#fff8e1" stroke="#b0bec5"/><text x="465.0" y="261" text-anchor="middle" font-size="15" font-weight="700" fill="#102027">Ambiguous?</text><text x="465.0" y="283" text-anchor="middle" font-size="12" fill="#455a64">action_review</text><rect x="575" y="230" width="150" height="70" rx="8" fill="#fff8e1" stroke="#b0bec5"/><text x="650.0" y="261" text-anchor="middle" font-size="15" font-weight="700" fill="#102027">LLM second pass</text><text x="650.0" y="283" text-anchor="middle" font-size="12" fill="#455a64">preflight-safe only</text><rect x="760" y="230" width="170" height="70" rx="8" fill="#fff8e1" stroke="#b0bec5"/><text x="845.0" y="261" text-anchor="middle" font-size="15" font-weight="700" fill="#102027">Deterministic fallback</text><text x="845.0" y="283" text-anchor="middle" font-size="12" fill="#455a64">no unsafe mutation</text><line x1="170" y1="129" x2="205" y2="129" stroke="#607d8b" stroke-width="2"/><polygon points="205,129 196,124 196,134" fill="#607d8b"/><line x1="355" y1="129" x2="390" y2="129" stroke="#607d8b" stroke-width="2"/><polygon points="390,129 381,124 381,134" fill="#607d8b"/><line x1="540" y1="129" x2="575" y2="129" stroke="#607d8b" stroke-width="2"/><polygon points="575,129 566,124 566,134" fill="#607d8b"/><line x1="725" y1="129" x2="760" y2="129" stroke="#607d8b" stroke-width="2"/><polygon points="760,129 751,124 751,134" fill="#607d8b"/><line x1="465" y1="166" x2="465" y2="230" stroke="#607d8b" stroke-width="2"/><polygon points="465,230 460,221 470,221" fill="#607d8b"/><line x1="540" y1="265" x2="575" y2="265" stroke="#607d8b" stroke-width="2"/><polygon points="575,265 566,260 566,270" fill="#607d8b"/><line x1="725" y1="265" x2="760" y2="265" stroke="#607d8b" stroke-width="2"/><polygon points="760,265 751,260 751,270" fill="#607d8b"/>
</svg>
