name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-deployment-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      RAILWAY_WORKER_SERVICE: ${{ secrets.RAILWAY_WORKER_SERVICE }}
      RAILWAY_BEAT_SERVICE: ${{ secrets.RAILWAY_BEAT_SERVICE }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
      PRODUCTION_DASHBOARD_URL: ${{ vars.PRODUCTION_DASHBOARD_URL }}
    steps:
      - name: Validate required deployment configuration
        run: |
          set -euo pipefail
          missing=0
          for name in \
            RAILWAY_API_TOKEN \
            RAILWAY_PROJECT_ID \
            RAILWAY_ENVIRONMENT \
            RAILWAY_SERVICE \
            RAILWAY_WORKER_SERVICE \
            RAILWAY_BEAT_SERVICE \
            VERCEL_TOKEN \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID \
            PRODUCTION_API_URL \
            PRODUCTION_DASHBOARD_URL
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for production deployment"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  deploy-backend:
    runs-on: ubuntu-latest
    needs: validate-deployment-config
    if: ${{ needs.validate-deployment-config.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js for Railway CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway up --ci --service "${{ secrets.RAILWAY_SERVICE }}" --project "${{ secrets.RAILWAY_PROJECT_ID }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}"

  run-migrations:
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ needs.deploy-backend.result == 'success' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js for Railway CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Run database migrations
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway run --service "${{ secrets.RAILWAY_SERVICE }}" --project "${{ secrets.RAILWAY_PROJECT_ID }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}" alembic upgrade head

  deploy-worker:
    runs-on: ubuntu-latest
    needs: run-migrations
    if: ${{ needs.run-migrations.result == 'success' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js for Railway CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy worker to Railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway up --ci --service "${{ secrets.RAILWAY_WORKER_SERVICE }}" --project "${{ secrets.RAILWAY_PROJECT_ID }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}"

  deploy-beat:
    runs-on: ubuntu-latest
    needs: run-migrations
    if: ${{ needs.run-migrations.result == 'success' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js for Railway CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy beat to Railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway up --ci --service "${{ secrets.RAILWAY_BEAT_SERVICE }}" --project "${{ secrets.RAILWAY_PROJECT_ID }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}"

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: validate-deployment-config
    if: ${{ needs.validate-deployment-config.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboardv2/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboardv2
        run: npm ci --include=optional

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel production artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy dashboard to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  post-deploy-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-backend
      - run-migrations
      - deploy-worker
      - deploy-beat
      - deploy-dashboard
    if: ${{ needs.deploy-backend.result == 'success' && needs.run-migrations.result == 'success' && needs.deploy-worker.result == 'success' && needs.deploy-beat.result == 'success' && needs.deploy-dashboard.result == 'success' }}
    env:
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
      PRODUCTION_DASHBOARD_URL: ${{ vars.PRODUCTION_DASHBOARD_URL }}
      POST_DEPLOY_SMOKE_BEARER: ${{ secrets.POST_DEPLOY_SMOKE_BEARER }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Run post-deploy smoke checks
        run: bash scripts/ci/run_post_deploy_smoke.sh
