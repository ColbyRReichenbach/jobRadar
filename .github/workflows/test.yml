name: Test

on:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend test suite
        run: pytest

  dashboard-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboardv2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: dashboardv2/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build
