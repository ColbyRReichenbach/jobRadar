name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - ai-platform

permissions:
  contents: read

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Audit backend dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run backend checks
        run: bash scripts/ci/run_backend_checks.sh

  backend-migrations-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: apptrail_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d apptrail_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/apptrail_ci
      JWT_SECRET: ci-jwt-secret
      APPTRAIL_GMAIL_TOKEN_ENCRYPTION_KEY: 9gesi-IgHlO6wRffB63j5cbQhIXnGGCKuxr0IFnAcaM=
      ANTHROPIC_API_KEY: test-key
      OPENAI_API_KEY: test-key
      ENVIRONMENT: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Validate Alembic has one head
        run: test "$(alembic heads --verbose | grep -c '^Rev:')" -eq 1

      - name: Run Alembic migrations on Postgres
        run: alembic upgrade head

  dashboard-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VITE_API_URL: http://localhost:8000
      VITE_COPILOT_ENABLED: "true"
      VITE_ADMIN_AI_OPS_ENABLED: "true"
      VITE_LOCAL_DEV_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboardv2/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboardv2
        run: npm ci --include=optional

      - name: Audit dashboard production dependencies
        working-directory: dashboardv2
        run: npm audit --omit=dev --audit-level=high

      - name: Restore Tailwind native binding
        working-directory: dashboardv2
        run: |
          TAILWIND_OXIDE_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@tailwindcss/oxide'].version")
          npm install --no-save "@tailwindcss/oxide-linux-x64-gnu@${TAILWIND_OXIDE_VERSION}"

      - name: Install Playwright Chromium
        working-directory: dashboardv2
        run: npx playwright install --with-deps chromium

      - name: Run dashboard checks
        run: bash scripts/ci/run_dashboard_checks.sh

  extension-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run extension checks
        run: bash scripts/ci/run_extension_checks.sh

  ai-feature-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VITE_API_URL: http://localhost:8000
      VITE_COPILOT_ENABLED: "true"
      VITE_ADMIN_AI_OPS_ENABLED: "true"
      VITE_LOCAL_DEV_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboardv2/package-lock.json

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install dashboard dependencies
        working-directory: dashboardv2
        run: npm ci --include=optional

      - name: Install Playwright Chromium
        working-directory: dashboardv2
        run: npx playwright install --with-deps chromium

      - name: Run targeted AI feature checks
        run: bash scripts/ci/run_ai_feature_checks.sh

  diff-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$PR_BASE_SHA" "$PR_HEAD_SHA"
          elif [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "$PUSH_BEFORE_SHA" "$CURRENT_SHA"
          else
            git diff --check HEAD~1 HEAD
          fi
